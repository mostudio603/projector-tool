<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
  :root {
    --chrome-bg: #1a1a1a; --chrome-fg: #b0b0b0; --chrome-border: #2a2a2a;
    --chrome-hover: #333; --accent: #7c9885; --panel-bg: #202020;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--chrome-bg); color: var(--chrome-fg);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ===== Top Bar ===== */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px; border-bottom: 1px solid var(--chrome-border);
    flex-shrink: 0; min-height: 44px;
  }
  .topbar-title { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: #666; user-select: none; }
  .topbar-filename { font-size: 13px; color: var(--chrome-fg); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-actions { display: flex; gap: 4px; align-items: center; }
  .btn {
    background: transparent; border: 1px solid var(--chrome-border); color: var(--chrome-fg);
    padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--chrome-hover); border-color: #444; color: #e0e0e0; }
  .btn-accent { border-color: var(--accent); color: var(--accent); }
  .btn-accent:hover { background: var(--accent); color: #fff; }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .style-select {
    background: var(--chrome-bg); border: 1px solid var(--chrome-border); color: var(--chrome-fg);
    padding: 5px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; outline: none;
  }
  .separator { width: 1px; height: 20px; background: var(--chrome-border); }

  /* ===== Main Layout ===== */
  .main-area { flex: 1; display: flex; overflow: hidden; }

  /* ===== File Sidebar (Left) ===== */
  .file-sidebar {
    width: 0; overflow: hidden; background: var(--panel-bg);
    border-right: 1px solid var(--chrome-border);
    transition: width 0.25s ease; flex-shrink: 0;
  }
  .file-sidebar.open { width: 220px; }
  .file-sidebar-inner {
    width: 220px; height: 100%; display: flex; flex-direction: column;
  }
  .file-sidebar-header {
    padding: 10px 12px; border-bottom: 1px solid var(--chrome-border);
    display: flex; align-items: center; gap: 6px;
  }
  .file-sidebar-header .sidebar-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #666; flex: 1; user-select: none; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .file-sidebar-header .btn { padding: 3px 8px; font-size: 11px; }
  .file-list {
    flex: 1; overflow-y: auto; padding: 4px 0;
  }
  .file-item {
    padding: 6px 14px; font-size: 12px; color: #999; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: all 0.1s; border-left: 2px solid transparent;
  }
  .file-item:hover { background: var(--chrome-hover); color: #ccc; }
  .file-item.active {
    background: rgba(124,152,133,0.12); color: var(--accent);
    border-left-color: var(--accent);
  }
  .file-item .file-ext {
    font-size: 10px; color: #555; margin-left: 4px;
  }
  .file-empty {
    padding: 20px 14px; font-size: 11px; color: #444; text-align: center;
  }

  /* ===== Content Area ===== */
  .content-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .content-area.has-content { display: block; }
  .content-area.dragging::after {
    content: '.md ファイルをドロップ'; position: absolute; inset: 12px;
    border: 2px dashed var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--accent); background: rgba(124,152,133,0.05);
    z-index: 10; pointer-events: none;
  }
  .placeholder { text-align: center; color: #444; user-select: none; }
  .placeholder-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .placeholder p { font-size: 13px; margin-bottom: 6px; }
  .placeholder .hint { font-size: 11px; color: #333; }
  .preview-scroll { overflow-y: auto; display: none; height: 100%; }
  .preview-scroll.active { display: block; }
  .preview-content {
    max-width: 800px; margin: 0 auto; padding: 48px 40px;
    background: #fff; min-height: 100%;
  }

  /* ===== Style Panel (Right) ===== */
  .style-panel {
    width: 0; overflow: hidden; background: var(--panel-bg);
    border-left: 1px solid var(--chrome-border);
    transition: width 0.25s ease; flex-shrink: 0;
  }
  .style-panel.open { width: 280px; }
  .style-panel-inner { width: 280px; height: 100%; overflow-y: auto; padding: 16px; }
  .panel-section { margin-bottom: 20px; }
  .panel-section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #666; margin-bottom: 10px; user-select: none;
    padding-bottom: 4px; border-bottom: 1px solid var(--chrome-border);
  }
  .panel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .panel-label { font-size: 11px; color: #888; min-width: 56px; flex-shrink: 0; }
  .panel-input {
    background: var(--chrome-bg); border: 1px solid var(--chrome-border); color: var(--chrome-fg);
    padding: 4px 6px; border-radius: 3px; font-size: 12px; outline: none; flex: 1; min-width: 0;
  }
  .panel-input:focus { border-color: var(--accent); }
  select.panel-input { cursor: pointer; }
  input[type="color"].panel-color {
    width: 28px; height: 24px; padding: 1px; border: 1px solid var(--chrome-border);
    border-radius: 3px; background: var(--chrome-bg); cursor: pointer; flex: 0 0 28px;
  }
  input[type="range"].panel-range { flex: 1; accent-color: var(--accent); height: 4px; }
  .panel-range-val { font-size: 11px; color: #888; min-width: 28px; text-align: right; }
  .h1-preview { background: #fff; border-radius: 4px; padding: 12px 14px; margin-bottom: 12px; }
  .h1-preview-text { font-size: 20px; font-weight: bold; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--accent); color: #fff; padding: 8px 20px;
    border-radius: 4px; font-size: 12px; opacity: 0;
    transition: all 0.25s ease; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== Print ===== */
  @media print {
    body { background: none; }
    .topbar, .style-panel, .file-sidebar, .toast { display: none; }
    .content-area { overflow: visible; }
    .preview-scroll { overflow: visible; }
    .preview-content { max-width: none; padding: 0; margin: 0; background: none; }
  }
  .page-break-hr hr { page-break-after: always; break-after: page; }
  .page-break-h1 h1 { page-break-before: always; break-before: page; }
  .page-break-h1 h1:first-child { page-break-before: avoid; break-before: avoid; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">MD Preview</span>
  <span class="topbar-filename" id="filename">ファイル未選択</span>
  <div class="topbar-actions">
    <button class="btn" id="folderToggle">ファイル</button>
    <button class="btn" id="openBtn">開く</button>
    <div class="separator"></div>
    <select class="style-select" id="pageBreak">
      <option value="">ページ区切り: なし</option>
      <option value="page-break-hr">--- で改ページ</option>
      <option value="page-break-h1">H1 で改ページ</option>
    </select>
    <div class="separator"></div>
    <button class="btn" id="styleToggle">スタイル</button>
    <div class="separator"></div>
    <button class="btn btn-accent" id="copyBtn" disabled>コピー</button>
    <button class="btn" id="printBtn" disabled>印刷</button>
  </div>
</div>

<div class="main-area">

  <!-- Left: File Sidebar -->
  <div class="file-sidebar" id="fileSidebar">
    <div class="file-sidebar-inner">
      <div class="file-sidebar-header">
        <span class="sidebar-title" id="folderName">フォルダ未選択</span>
        <button class="btn" id="pickFolderBtn">選択</button>
        <button class="btn" id="refreshBtn" title="再読み込み">↻</button>
      </div>
      <div class="file-list" id="fileList">
        <div class="file-empty">「選択」でフォルダを開く</div>
      </div>
    </div>
  </div>

  <!-- Center: Preview -->
  <div class="content-area" id="contentArea">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">◇</div>
      <p>.md ファイルをドロップ、またはクリックで開く</p>
      <p class="hint">Ctrl+V でクリップボードのMarkdownも貼り付け可能</p>
    </div>
    <div class="preview-scroll" id="previewScroll">
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>

  <!-- Right: Style Panel -->
  <div class="style-panel" id="stylePanel">
    <div class="style-panel-inner">
      <div class="panel-section">
        <div class="panel-section-title">全体</div>
        <div class="panel-row">
          <span class="panel-label">フォント</span>
          <select class="panel-input" id="s-font">
            <option value="'BIZ UDPGothic', sans-serif">BIZ UDPGothic</option>
            <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
            <option value="'Noto Serif JP', serif">Noto Serif JP</option>
          </select>
        </div>
        <div class="panel-row">
          <span class="panel-label">文字サイズ</span>
          <input type="range" class="panel-range" id="s-fontsize" min="11" max="20" value="14">
          <span class="panel-range-val" id="s-fontsize-val">14px</span>
        </div>
        <div class="panel-row">
          <span class="panel-label">行間</span>
          <input type="range" class="panel-range" id="s-lineheight" min="14" max="28" value="19" step="1">
          <span class="panel-range-val" id="s-lineheight-val">1.9</span>
        </div>
        <div class="panel-row">
          <span class="panel-label">文字色</span>
          <input type="color" class="panel-color" id="s-color" value="#222222">
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">H1 見出し</div>
        <div class="h1-preview"><div class="h1-preview-text" id="h1PreviewText">見出しサンプル</div></div>
        <div class="panel-row">
          <span class="panel-label">サイズ</span>
          <input type="range" class="panel-range" id="h1-size" min="18" max="32" value="22">
          <span class="panel-range-val" id="h1-size-val">22px</span>
        </div>
        <div class="panel-row">
          <span class="panel-label">文字色</span>
          <input type="color" class="panel-color" id="h1-color" value="#222222">
        </div>
        <div class="panel-row">
          <span class="panel-label">背景色</span>
          <input type="color" class="panel-color" id="h1-bg" value="#2b5e2b">
          <label style="font-size:11px;color:#888;cursor:pointer;"><input type="checkbox" id="h1-bg-on" style="accent-color:var(--accent)"> ON</label>
        </div>
        <div class="panel-row">
          <span class="panel-label">下線</span>
          <input type="color" class="panel-color" id="h1-border-color" value="#333333">
          <select class="panel-input" id="h1-border-width" style="width:60px;flex:0 0 60px;">
            <option value="0">なし</option><option value="2" selected>2px</option><option value="3">3px</option><option value="4">4px</option>
          </select>
        </div>
        <div class="panel-row">
          <span class="panel-label">囲み線</span>
          <input type="color" class="panel-color" id="h1-outline-color" value="#2b5e2b">
          <select class="panel-input" id="h1-outline-width" style="width:60px;flex:0 0 60px;">
            <option value="0" selected>なし</option><option value="1">1px</option><option value="2">2px</option><option value="3">3px</option>
          </select>
        </div>
        <div class="panel-row">
          <span class="panel-label">行頭文字</span>
          <select class="panel-input" id="h1-marker">
            <option value="">なし</option><option value="◆">◆</option><option value="■">■</option>
            <option value="●">●</option><option value="▶">▶</option><option value="§">§</option>
          </select>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">H2〜H6 見出し</div>
        <div class="panel-row">
          <span class="panel-label">スタイル</span>
          <select class="panel-input" id="h2-preset">
            <option value="simple">シンプル</option><option value="underline" selected>下線</option>
            <option value="accent">アクセント</option><option value="full">しっかり</option>
          </select>
        </div>
        <div class="panel-row">
          <span class="panel-label">テーマ色</span>
          <input type="color" class="panel-color" id="h2-theme-color" value="#2b5e2b">
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".md,.markdown,.txt" style="display:none">

<script>
const $ = id => document.getElementById(id);
const previewContent = $('previewContent');
const previewScroll = $('previewScroll');
const placeholder = $('placeholder');
const contentArea = $('contentArea');
const fileInput = $('fileInput');
const pageBreak = $('pageBreak');
const copyBtn = $('copyBtn');
const printBtn = $('printBtn');
const filename = $('filename');
const toast = $('toast');
const stylePanel = $('stylePanel');
const styleToggle = $('styleToggle');
const fileSidebar = $('fileSidebar');
const folderToggle = $('folderToggle');
const fileList = $('fileList');
const folderName = $('folderName');

let currentMarkdown = '';
let dirHandle = null;
let fileHandles = [];
let activeFileHandle = null;

marked.setOptions({ breaks: true, gfm: true });

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function renderMarkdown(md) {
  currentMarkdown = md;
  previewContent.innerHTML = marked.parse(md);
  previewScroll.classList.add('active');
  placeholder.style.display = 'none';
  contentArea.classList.add('has-content');
  copyBtn.disabled = false;
  printBtn.disabled = false;
  applyStyles();
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => { filename.textContent = file.name; renderMarkdown(e.target.result); };
  reader.readAsText(file);
}

// ===== File System Access API =====
async function pickFolder() {
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    folderName.textContent = dirHandle.name;
    if (!fileSidebar.classList.contains('open')) {
      fileSidebar.classList.add('open');
      folderToggle.classList.add('active');
    }
    await refreshFileList();
  } catch (e) {
    // User cancelled
  }
}

async function refreshFileList() {
  if (!dirHandle) return;
  fileHandles = [];
  const entries = [];

  for await (const [name, handle] of dirHandle) {
    if (handle.kind === 'file' && /\.(md|markdown|txt)$/i.test(name)) {
      entries.push({ name, handle });
    }
  }

  // Sort alphabetically
  entries.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  fileHandles = entries;

  // Render list
  if (entries.length === 0) {
    fileList.innerHTML = '<div class="file-empty">.md ファイルが見つかりません</div>';
    return;
  }

  fileList.innerHTML = '';
  for (const entry of entries) {
    const div = document.createElement('div');
    div.className = 'file-item';
    if (activeFileHandle && activeFileHandle.name === entry.name) div.classList.add('active');

    const baseName = entry.name.replace(/\.(md|markdown|txt)$/i, '');
    const ext = entry.name.match(/\.(md|markdown|txt)$/i)?.[0] || '';
    div.innerHTML = `${esc(baseName)}<span class="file-ext">${esc(ext)}</span>`;

    div.addEventListener('click', () => openFileHandle(entry));
    fileList.appendChild(div);
  }
}

async function openFileHandle(entry) {
  try {
    const file = await entry.handle.getFile();
    const text = await file.text();
    activeFileHandle = entry;
    filename.textContent = entry.name;
    renderMarkdown(text);

    // Update active state in list
    fileList.querySelectorAll('.file-item').forEach((el, i) => {
      el.classList.toggle('active', fileHandles[i]?.name === entry.name);
    });
  } catch (e) {
    showToast('ファイルを読み込めませんでした');
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== Dynamic Style Builder =====
function applyStyles() {
  const font = $('s-font').value;
  const fontSize = $('s-fontsize').value;
  const lineHeight = ($('s-lineheight').value / 10).toFixed(1);
  const color = $('s-color').value;
  const h1Size = $('h1-size').value;
  const h1Color = $('h1-color').value;
  const h1BgOn = $('h1-bg-on').checked;
  const h1Bg = $('h1-bg').value;
  const h1BorderW = $('h1-border-width').value;
  const h1BorderC = $('h1-border-color').value;
  const h1OutW = $('h1-outline-width').value;
  const h1OutC = $('h1-outline-color').value;
  const h1Marker = $('h1-marker').value;
  const h2Preset = $('h2-preset').value;
  const h2Theme = $('h2-theme-color').value;
  const bfs = parseInt(fontSize);
  const h2Size = Math.round(bfs * 1.3);
  const h3Size = Math.round(bfs * 1.15);

  let h1BorderCSS = 'border: none;';
  if (h1OutW !== '0') h1BorderCSS = `border: ${h1OutW}px solid ${h1OutC};`;
  else if (h1BorderW !== '0') h1BorderCSS = `border: none; border-bottom: ${h1BorderW}px solid ${h1BorderC};`;

  let h1Padding = '4px 0';
  if (h1BgOn || h1OutW !== '0') h1Padding = '8px 14px';
  else if (h1BorderW !== '0') h1Padding = '4px 0 6px 0';

  let css = `
    .preview-content { font-family: ${font}; font-size: ${fontSize}px; line-height: ${lineHeight}; color: ${color}; }
    .preview-content h1 {
      font-size: ${h1Size}px; font-weight: bold;
      color: ${h1BgOn ? '#fff' : h1Color}; background: ${h1BgOn ? h1Bg : 'transparent'};
      padding: ${h1Padding}; margin: 32px 0 16px; ${h1BorderCSS}
      border-radius: ${(h1BgOn || h1OutW !== '0') ? '4px' : '0'};
    }
    .preview-content h1::before { content: ${h1Marker ? '"' + h1Marker + ' "' : 'none'}; }
    .preview-content h2 { font-size: ${h2Size}px; font-weight: bold; margin: 28px 0 12px; }
    .preview-content h3 { font-size: ${h3Size}px; font-weight: bold; margin: 24px 0 10px; }
    .preview-content h4, .preview-content h5, .preview-content h6 { font-size: ${bfs}px; font-weight: bold; margin: 20px 0 8px; }
  `;

  const presets = {
    simple: `.preview-content h2,.preview-content h3,.preview-content h4,.preview-content h5,.preview-content h6{color:${color};}`,
    underline: `
      .preview-content h2{color:${color};border-bottom:2px solid ${h2Theme};padding-bottom:4px;}
      .preview-content h3{color:${color};border-bottom:1px solid ${h2Theme}88;padding-bottom:3px;}
      .preview-content h4,.preview-content h5,.preview-content h6{color:${color};}`,
    accent: `
      .preview-content h2{color:${h2Theme};}.preview-content h2::before{content:"◆ ";}
      .preview-content h3{color:${h2Theme};}.preview-content h3::before{content:"◇ ";}
      .preview-content h4,.preview-content h5,.preview-content h6{color:${h2Theme}cc;}`,
    full: `
      .preview-content h2{color:${h2Theme};border-bottom:2px solid ${h2Theme};padding-bottom:4px;}.preview-content h2::before{content:"■ ";}
      .preview-content h3{color:${h2Theme};border-bottom:1px solid ${h2Theme}88;padding-bottom:3px;}.preview-content h3::before{content:"□ ";}
      .preview-content h4,.preview-content h5,.preview-content h6{color:${h2Theme}cc;}.preview-content h4::before{content:"・";}`
  };
  css += presets[h2Preset] || '';

  css += `
    .preview-content p{margin:0 0 12px;} .preview-content ul,.preview-content ol{margin:0 0 12px;padding-left:24px;}
    .preview-content li{margin-bottom:4px;} .preview-content code{font-family:'BIZ UDPGothic',monospace;background:#f4f4f4;padding:1px 5px;border-radius:3px;font-size:0.9em;}
    .preview-content pre{background:#f7f7f7;border:1px solid #e0e0e0;border-radius:4px;padding:14px;margin:0 0 12px;overflow-x:auto;}
    .preview-content pre code{background:none;padding:0;} .preview-content blockquote{border-left:3px solid #999;padding-left:14px;color:#555;margin:0 0 12px;}
    .preview-content table{border-collapse:collapse;margin:0 0 12px;width:100%;} .preview-content th,.preview-content td{border:1px solid #ccc;padding:6px 10px;font-size:0.93em;}
    .preview-content th{background:#f0f0f0;font-weight:bold;} .preview-content hr{border:none;border-top:1px solid #ddd;margin:24px 0;}
    .preview-content img{max-width:100%;height:auto;}
  `;

  let dynStyle = document.getElementById('dyn-css');
  if (!dynStyle) { dynStyle = document.createElement('style'); dynStyle.id = 'dyn-css'; document.head.appendChild(dynStyle); }
  dynStyle.textContent = css;

  previewContent.className = 'preview-content';
  if (pageBreak.value) previewContent.classList.add(pageBreak.value);
  updateH1Preview();
}

function updateH1Preview() {
  const el = $('h1PreviewText');
  const font = $('s-font').value;
  const h1Color = $('h1-color').value;
  const h1BgOn = $('h1-bg-on').checked;
  const h1Bg = $('h1-bg').value;
  const h1BorderW = $('h1-border-width').value;
  const h1BorderC = $('h1-border-color').value;
  const h1OutW = $('h1-outline-width').value;
  const h1OutC = $('h1-outline-color').value;
  const h1Marker = $('h1-marker').value;
  const h1Size = Math.min(parseInt($('h1-size').value), 24);

  el.style.fontFamily = font;
  el.style.fontSize = h1Size + 'px';
  el.style.color = h1BgOn ? '#fff' : h1Color;
  el.style.background = h1BgOn ? h1Bg : 'transparent';
  el.style.borderRadius = (h1BgOn || h1OutW !== '0') ? '3px' : '0';
  el.style.border = 'none'; el.style.borderBottom = 'none';
  if (h1OutW !== '0') { el.style.border = h1OutW+'px solid '+h1OutC; el.style.padding = '6px 10px'; }
  else if (h1BorderW !== '0') { el.style.borderBottom = h1BorderW+'px solid '+h1BorderC; el.style.padding = h1BgOn ? '6px 10px' : '2px 0 4px 0'; }
  else { el.style.padding = h1BgOn ? '6px 10px' : '2px 0'; }
  el.textContent = (h1Marker ? h1Marker + ' ' : '') + '見出しサンプル';
}

// ===== Events =====

// File sidebar toggle
folderToggle.addEventListener('click', () => {
  fileSidebar.classList.toggle('open');
  folderToggle.classList.toggle('active');
});

$('pickFolderBtn').addEventListener('click', pickFolder);
$('refreshBtn').addEventListener('click', refreshFileList);

// Style panel toggle
styleToggle.addEventListener('click', () => {
  stylePanel.classList.toggle('open');
  styleToggle.classList.toggle('active');
});

// Style inputs
document.querySelectorAll('#stylePanel input, #stylePanel select').forEach(el => {
  const handler = () => {
    $('s-fontsize-val').textContent = $('s-fontsize').value + 'px';
    $('s-lineheight-val').textContent = ($('s-lineheight').value / 10).toFixed(1);
    $('h1-size-val').textContent = $('h1-size').value + 'px';
    applyStyles();
  };
  el.addEventListener('input', handler);
  el.addEventListener('change', handler);
});

// File open (single file)
$('openBtn').addEventListener('click', () => fileInput.click());
placeholder.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

// Drag & drop
contentArea.addEventListener('dragover', e => { e.preventDefault(); contentArea.classList.add('dragging'); });
contentArea.addEventListener('dragleave', () => contentArea.classList.remove('dragging'));
contentArea.addEventListener('drop', e => {
  e.preventDefault(); contentArea.classList.remove('dragging');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

// Paste
document.addEventListener('paste', e => {
  if (e.target.closest('.style-panel') || e.target.closest('.file-sidebar')) return;
  const text = e.clipboardData.getData('text/plain');
  if (text && text.trim()) { filename.textContent = 'クリップボード'; renderMarkdown(text); showToast('クリップボードから読み込みました'); }
});

// Page break
pageBreak.addEventListener('change', applyStyles);

// Rich text copy
copyBtn.addEventListener('click', async () => {
  const clone = previewContent.cloneNode(true);
  inlineCS(previewContent, clone);
  try {
    const blob = new Blob([clone.outerHTML], { type: 'text/html' });
    const textBlob = new Blob([currentMarkdown], { type: 'text/plain' });
    await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob })]);
    showToast('リッチテキストとしてコピーしました');
  } catch {
    const range = document.createRange();
    range.selectNodeContents(previewContent);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    showToast('コピーしました');
  }
});

function inlineCS(src, tgt) {
  const keys = ['font-family','font-size','font-weight','line-height','color','background-color','padding','border-bottom','border','border-radius','margin-top','margin-bottom'];
  const cs = window.getComputedStyle(src);
  let s = '';
  for (const k of keys) { const v = cs.getPropertyValue(k); if (v) s += `${k}:${v};`; }
  tgt.setAttribute('style', s);
  const bef = window.getComputedStyle(src, '::before');
  if (bef.content && bef.content !== 'none' && bef.content !== 'normal') {
    const txt = bef.content.replace(/"/g, '');
    if (txt && !(tgt.firstChild?.nodeType === 3 && tgt.firstChild.textContent.startsWith(txt))) {
      tgt.insertBefore(document.createTextNode(txt), tgt.firstChild);
    }
  }
  for (let i = 0; i < src.children.length && i < tgt.children.length; i++) inlineCS(src.children[i], tgt.children[i]);
}

// Print
printBtn.addEventListener('click', () => window.print());

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'o') { e.preventDefault(); fileInput.click(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') { e.preventDefault(); if (!printBtn.disabled) window.print(); }
});

applyStyles();
</script>
</body>
